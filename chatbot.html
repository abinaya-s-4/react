<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>
    <script src = "react-basics.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function ChatInput({chatMessage,setChatMessage}){
        const [inputText, setInputText] = React.useState('')

        function saveInputText(event){
          setInputText(event.target.value)
        }
        function sendMessage(){
          const newChatMessages = [
            ...chatMessage,
            {
              message : inputText,
              sender: 'user',
              id: crypto.randomUUID()
            }
          ]

          setChatMessage(newChatMessages);

          const response = Chatbot.getResponse(inputText);
          setChatMessage([
            ...newChatMessages,
            {
              message : response,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);


          setInputText('');
          console.log("After clear:", inputText);
        }
        

        return (
          <>
          <input 
            placeholder="Send a message to Chatbot" 
            size ="30"
            value = {inputText}
            onChange ={saveInputText} />
          <button
            onClick= {sendMessage} >Send</button>
          </>
        );
      }
      function ChatMessage(props){
        const message = props.message;// const {message, sender} = props // destructuring
        const sender = props.sender;
        if (sender === 'robot'){
          return (
            <div>
            <img src ="img/robot.png" width ="50" />
            {message}
          </div>
          );
        } else {
        return (
          <div>
            {message}
            <img src ="img/user.png" width ="50" />
          </div>
        );
        }
      }

      function ChatMessages({chatMessage}){

        return (
          <>
          {chatMessage.map((chatMessage)=>{
          return (
            <ChatMessage 
              message = {chatMessage.message}
              sender = {chatMessage.sender} 
              key = {chatMessage.id} />
          );
        })}
        </>
      )}

      function App(){

        const [chatMessage, setChatMessage] = React.useState([{
          message:"hello chatbot" ,
          sender:"user",
          id : "id1"
        },{
          message:"Hello! How can I help you?" ,
          sender:"robot",
          id : "id2"
        },{
          message:"can you get me todays date" ,
          sender:"user",
          id : "id3"
        },{
          message:"Today is April 24" ,
          sender:"robot",
          id : "id4"
        }]);

        //const chatMessage = array[0];
        //const setChatMessage = array[1];

        return (
          <>
        <ChatInput
          chatMessage = {chatMessage}
          setChatMessage = {setChatMessage}
        />
        <ChatMessages
          chatMessage = {chatMessage}
        />
        </>
        )
      }
      

    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
