<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>
    <script src = "react-basics.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function ChatInput(){
        return (
          <>
          <input 
            placeholder="Send a message to Chatbot" 
            size ="30" />
          <button>Send</button>
          </>
        );
      }
      function ChatMessage(props){
        const message = props.message;// const {message, sender} = props // destructuring
        const sender = props.sender;
        if (sender === 'robot'){
          return (
            <div>
            <img src ="img/robot.png" width ="50" />
            {message}
          </div>
          );
        } else {
        return (
          <div>
            {message}
            <img src ="img/user.png" width ="50" />
          </div>
        );
        }
      }

      function ChatMessages(){
        const chatMessage = [{
          message:"hello chatbot" ,
          sender:"user",
          id : "id1"
        },{
          message:"Hello! How can I help you?" ,
          sender:"robot",
          id : "id2"
        },{
          message:"can you get me todays date" ,
          sender:"user",
          id : "id3"
        },{
          message:"Today is April 24" ,
          sender:"robot",
          id : "id4"
        }];
        function sendMessage(){
          console.log('Send message')
        }

        return (
          <>
          <button onClick= {sendMessage}>Send Message</button>

          {chatMessage.map((chatMessage)=>{
          return (
            <ChatMessage 
              message = {chatMessage.message}
              sender = {chatMessage.sender} 
              key = {chatMessage.id} />
          );
        })}
        </>
      )}

      function App(){

        return (
          <>
        <ChatInput />
        <ChatMessages />
        </>
        )
      }
      

    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
